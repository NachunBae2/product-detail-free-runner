name: product-detail-free-runner

on:
  workflow_dispatch:
    inputs:
      payload:
        description: JSON payload for product-detail cloud dispatch
        required: true
  repository_dispatch:
    types:
      - product_detail_free_runner

permissions:
  actions: write
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    concurrency:
      group: product-detail-free-runner
      cancel-in-progress: false
    timeout-minutes: 360
    steps:
      - name: Checkout private runner code
        uses: actions/checkout@v4
        with:
          repository: NachunBae2/alibaba-dot-com-AIOS
          ref: codex/product-detail-cloud-service
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: cloud

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install runtime tools
        working-directory: cloud
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y rclone imagemagick ffmpeg zip unzip jq
          npm ci
          npm install -g @openai/codex god-tibo-imagen @google/gemini-cli
          python3 -m pip install --user pillow
          codex --version || true
          gti --help >/dev/null

      - name: Write payload
        env:
          EVENT_NAME: ${{ github.event_name }}
          MANUAL_PAYLOAD: ${{ inputs.payload || '{}' }}
          CLIENT_PAYLOAD: ${{ toJson(github.event.client_payload) }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            printf '%s' "$MANUAL_PAYLOAD" | jq '{client_payload: .}' > /tmp/product-detail-payload.json
          else
            printf '%s' "$CLIENT_PAYLOAD" | jq '{client_payload: .}' > /tmp/product-detail-payload.json
          fi
          jq '{client_payload: {agent: .client_payload.agent, event: {channel: .client_payload.event.channel, thread_ts: (.client_payload.event.thread_ts // .client_payload.event.ts), ts: .client_payload.event.ts}, product: .client_payload.product}}' /tmp/product-detail-payload.json

      - name: Run product detail cloud dispatch
        working-directory: cloud
        env:
          CODEX_AUTH_JSON_B64: ${{ secrets.CODEX_AUTH_JSON_B64 }}
          CODEX_CONFIG_TOML_B64: ${{ secrets.CODEX_CONFIG_TOML_B64 }}
          RCLONE_CONFIG_B64: ${{ secrets.RCLONE_CONFIG_B64 }}
          SLACK_BOT_TOKEN_DESIGN_LEADER: ${{ secrets.SLACK_BOT_TOKEN_DESIGN_LEADER }}
          SLACK_BOT_TOKEN_PRODUCT_DETAIL_LOCALIZER: ${{ secrets.SLACK_BOT_TOKEN_PRODUCT_DETAIL_LOCALIZER }}
          PRODUCT_DETAIL_DRIVE_REMOTE: ${{ secrets.PRODUCT_DETAIL_DRIVE_REMOTE }}
          HARNESS_DESIGN_LEADER_USER_ID: ${{ secrets.HARNESS_DESIGN_LEADER_USER_ID }}
          HARNESS_PRODUCT_DETAIL_LOCALIZER_USER_ID: ${{ secrets.HARNESS_PRODUCT_DETAIL_LOCALIZER_USER_ID }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: node scripts/run-product-detail-cloud-dispatch.mjs /tmp/product-detail-payload.json

      - name: Dispatch next product
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
          CHAIN_LEDGER_B64: ${{ secrets.PRODUCT_DETAIL_CHAIN_LEDGER_B64 }}
        run: |
          set -euo pipefail
          if [ -z "${CHAIN_LEDGER_B64:-}" ]; then
            echo "PRODUCT_DETAIL_CHAIN_LEDGER_B64 is empty; skip chaining."
            exit 0
          fi
          printf '%s' "$CHAIN_LEDGER_B64" | base64 -d > /tmp/product-detail-chain-ledger.json
          current="$(jq -r '.client_payload.product.productOrder' /tmp/product-detail-payload.json)"
          channel="$(jq -r '.client_payload.event.channel' /tmp/product-detail-payload.json)"
          index="$(jq --arg current "$current" -r '.threads | map(.productOrder) | index($current)' /tmp/product-detail-chain-ledger.json)"
          if [ "$index" = "null" ]; then
            echo "Current product not found in chain ledger: $current"
            exit 0
          fi
          next="$(jq -c --argjson index "$index" '.threads[$index + 1] // empty' /tmp/product-detail-chain-ledger.json)"
          if [ -z "$next" ]; then
            echo "Chain complete after $current."
            exit 0
          fi
          payload="$(jq -c --arg channel "$channel" '
            {
              agent: "product-detail-localizer",
              event: {
                channel: $channel,
                ts: .threadTs,
                thread_ts: .threadTs,
                user: "cloud",
                text: ("[free-runner-9f5011c] " + .productOrder + " 실제상품 상세페이지 영문화")
              },
              product: {
                productOrder: .productOrder,
                targetLanguage: "English",
                mode: "free-runner-9f5011c"
              }
            }
          ' <<< "$next")"
          echo "Dispatching next product after $current: $(jq -r '.product.productOrder' <<< "$payload")"
          gh workflow run product-detail-free-runner.yml \
            --repo NachunBae2/product-detail-free-runner \
            --ref main \
            -f payload="$payload"
